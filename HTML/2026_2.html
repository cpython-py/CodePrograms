<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>2026新年快乐 - 叶禹诺</title>
    <style>
        :root {
            --primary-color: #ff3333;
            --gold-color: #ffd700;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #200303 0%, #000 100%);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 覆盖层：点击进入 */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
        }

        .start-btn {
            padding: 15px 40px;
            border: 2px solid var(--gold-color);
            border-radius: 30px;
            font-size: 1.2rem;
            color: var(--gold-color);
            background: transparent;
            margin-top: 20px;
            transition: all 0.3s;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            /* 让点击穿透到烟花 */
        }

        .title {
            font-size: 2.8rem;
            font-weight: bold;
            background: linear-gradient(to bottom,
                    #fff 20%,
                    var(--gold-color) 50%,
                    #ff8c00 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.5));
            margin-bottom: 30px;
            text-align: center;
        }

        /* 倒计时样式 */
        .countdown-wrapper {
            display: flex;
            gap: 15px;
        }

        .unit {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            min-width: 65px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .number {
            display: block;
            font-size: 2.2rem;
            color: var(--gold-color);
            font-weight: 900;
        }

        .label {
            font-size: 0.8rem;
            color: #eee;
            margin-top: 5px;
        }

        /* 最终祝福语 */
        #blessing {
            display: none;
            font-size: 3.5rem;
            line-height: 1.5;
            color: #ff3333;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff0, 0 0 40px #f00;
            animation: celebrate 1s infinite alternate;
        }

        @keyframes celebrate {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.1);
            }
        }

        /* 灯笼特效 */
        .lantern {
            position: absolute;
            width: 40px;
            height: 50px;
            background: #ff0000;
            border-radius: 50% 50% 45% 45%;
            box-shadow: 0 0 20px #ff0000;
            z-index: 5;
            animation: swing 3s ease-in-out infinite alternate;
        }

        @keyframes swing {
            from {
                transform: rotate(-5deg);
            }

            to {
                transform: rotate(5deg);
            }
        }

        #music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div id="overlay" onclick="startExperience()">
        <h2 style="color: #ffd700">迎接 2026</h2>
        <p>点击屏幕开启新年礼花</p>
        <div class="start-btn">开启精彩</div>
    </div>

    <div id="music-btn" onclick="toggleMusic()">🎵</div>

    <canvas id="canvas"></canvas>

    <div class="container">
        <div id="timer-ui">
            <div class="title">距离 2026 年还有</div>
            <div class="countdown-wrapper">
                <div class="unit">
                    <span class="number" id="d">00</span>
                    <div class="label">天</div>
                </div>
                <div class="unit">
                    <span class="number" id="h">00</span>
                    <div class="label">时</div>
                </div>
                <div class="unit">
                    <span class="number" id="m">00</span>
                    <div class="label">分</div>
                </div>
                <div class="unit">
                    <span class="number" id="s">00</span>
                    <div class="label">秒</div>
                </div>
            </div>
        </div>

        <div id="blessing">
            叶禹诺小朋友<br />
            <span style="font-size: 4.5rem">新年快乐</span><br />
            🧧🧧🧧
        </div>
    </div>

    <audio id="bgm" loop>
        <!-- 使用一个欢快的背景音乐 -->
        <source src="https://music.163.com/song/media/outer/url?id=1416630800.mp3" type="audio/mpeg" />
    </audio>

    <script>
        // --- 基础配置 ---
        const targetTime = new Date("2026-01-01 00:00:00").getTime();
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        let width,
            height,
            fireworks = [],
            particles = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", init);
        init();

        // --- 倒计时逻辑 ---
        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetTime - now;

            if (diff <= 0) {
                document.getElementById("timer-ui").style.display = "none";
                document.getElementById("blessing").style.display = "block";
                return;
            }

            document.getElementById("d").innerText = Math.floor(diff / 86400000)
                .toString()
                .padStart(2, "0");
            document.getElementById("h").innerText = Math.floor(
                (diff % 86400000) / 3600000
            )
                .toString()
                .padStart(2, "0");
            document.getElementById("m").innerText = Math.floor(
                (diff % 3600000) / 60000
            )
                .toString()
                .padStart(2, "0");
            document.getElementById("s").innerText = Math.floor(
                (diff % 60000) / 1000
            )
                .toString()
                .padStart(2, "0");
        }
        setInterval(updateTimer, 1000);

        // --- 烟花引擎 ---
        class Firework {
            constructor() {
                this.x = Math.random() * width;
                this.y = height;
                this.targetY = Math.random() * (height * 0.5);
                this.speed = 5 + Math.random() * 5;
                this.angle = Math.atan2(this.targetY - height, 0);
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
            }
            update() {
                this.y -= this.speed;
                if (this.y <= this.targetY) {
                    explode(this.x, this.y, this.color);
                    return false;
                }
                return true;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.deg = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 6 + 2;
                this.friction = 0.96;
                this.gravity = 0.15;
                this.alpha = 1;
            }
            update() {
                this.speed *= this.friction;
                this.x += Math.cos(this.deg) * this.speed;
                this.y += Math.sin(this.deg) * this.speed + this.gravity;
                this.alpha -= 0.015;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function explode(x, y, color) {
            for (let i = 0; i < 80; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function render() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
            ctx.fillRect(0, 0, width, height);

            if (Math.random() < 0.05) fireworks.push(new Firework());

            fireworks = fireworks.filter((f) => {
                if (f.update()) {
                    f.draw();
                    return true;
                }
                return false;
            });

            particles = particles.filter((p) => {
                if (p.alpha > 0) {
                    p.update();
                    p.draw();
                    return true;
                }
                return false;
            });

            requestAnimationFrame(render);
        }

        // --- 交互控制 ---
        function startExperience() {
            document.getElementById("overlay").style.display = "none";
            const audio = document.getElementById("bgm");
            audio.play();
            render();
            // 自动点击产生烟花
            setInterval(() => {
                explode(
                    Math.random() * width,
                    Math.random() * height * 0.6,
                    `hsl(${Math.random() * 360},100%,60%)`
                );
            }, 1500);
        }

        function toggleMusic() {
            const audio = document.getElementById("bgm");
            if (audio.paused) audio.play();
            else audio.pause();
        }

        // 禁止右键和F12审查元素（简单防护）
        document.oncontextmenu = () => false;
        document.onkeydown = (e) => {
            if (e.keyCode === 123) return false;
        };
    </script>
</body>

</html>
