<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>补充几个常用的标签</title>
</head>
<body>
    <!-- 换行标签 -->
    <a href="#">巴拉1</a>
    <br>
    <a href="#">巴拉2</a>

    <!-- 分割线标签 -->
    <hr>
    <a href="#">巴拉3</a>

    <!-- 按原文显示 -->
    <pre>
        我是   ee
        多行      11
        文本  2
    </pre>
</body>
</html>
