<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>块级元素与行内元素</title>
</head>
<body>
    <!-- 块级元素 特点:独占一行 -->
    <!-- <marquee>尚硅谷</marquee>
    <marquee>尚硅谷</marquee>
    <h1>尚硅谷</h1>
    <h1>尚硅谷</h1>
    <p>尚硅谷</p>
    <p>尚硅谷</p>
    <div>尚硅谷</div>
    <div>尚硅谷</div>-->

    <!-- 行内元素 特点:不独占一行 -->
    <!--<input type="text">
    <input type="text">-->

    <!-- 块级元素 特点:既能写行内元素, 又能写块级元素 -->
    <div>
        <p>尚硅谷</p>
        <p>尚硅谷</p>
        <input type="text">
    </div>

    <!-- 行内元素 特点:只能写行内元素,不能写块级元素 -->
    <span>
        <div>尚硅谷</div>
        <p>尚硅谷2</p>
    </span>
</body>
</html>
