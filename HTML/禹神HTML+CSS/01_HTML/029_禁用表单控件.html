<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>禁用表单控件</title>
</head>
<body>
<form action="">
        账户:<input disabled type="text" name="account" value="zhansan" maxlength="10">
        <br>
        密码:<input type="password" name="pwd" value="123456" maxlength="6">
        <br>
        性别:
        <input type="radio" name="gender" value="male">男
        <input type="radio" name="gender" value="female" checked>女
        <br>
        爱好:
        <input type="checkbox" name="hobby" value="smoke" checked>抽烟
        <input type="checkbox" name="hobby" value="drink">喝酒
        <input type="checkbox" name="hobby" value="perm" checked>烫头
        <br>
        <input type="hidden" name="tag" value="from">
        <br>
        其他:<textarea name="desc" cols="20" rows="3"></textarea>
        <br>
        籍贯:<select name="place" style="background-color: darkgrey;width: 160px;height: 30px">
            <option>河南</option>
            <option>北京</option>
            <option>上海</option>
            <option>河北</option>
            <option>山西</option>
        </select>
        <br>
        <input type="submit" value="点我确认">
        <input type="reset" value="点我重置">
        <button type="button">检测账户是否被注册</button>
<!--        <button>确认</button>-->
<!--        <button type="reset">重置</button>-->
    </form>
</body>
</html>
