<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>表格常用属性</title>
</head>
<body>
<table border="20px" width="500px" height="300px" cellspacing="10px">
    <!-- 表格标题 -->
    <caption height="20px" style="background-color: aqua;">学生信息</caption>
    <!-- 表格头部 -->
    <thead height="30px" style="background-color: pink;" align="left" valign="top">
        <tr>
            <th>姓名</th>
            <th>性别</th>
            <th>民族</th>
            <th>政治面貌</th>
        </tr>
    </thead>
    <!-- 表格主体 -->
    <tbody style="background-color: lightblue;" align="center" valign="middle">
        <tr>
            <td>张三</td>
            <td>男</td>
            <td>汉族</td>
            <td>团员</td>
        </tr>
        <tr>
            <td>李四</td>
            <td>女</td>
            <td>满族</td>
            <td>群众</td>
        </tr>
        <tr>
            <td>王五</td>
            <td>男</td>
            <td>回族</td>
            <td>团员</td>
        </tr>
        <tr>
            <td>赵六</td>
            <td>女</td>
            <td>壮族</td>
            <td>党员</td>
        </tr>
    </tbody>
    <!-- 表格底部 -->
    <tfoot style="background-color: lightgreen;" align="right" valign="bottom">
         <tr>
            <td></td>
            <td></td>
            <td></td>
            <td>共计:4人</td>
        </tr>
    </tfoot>
</table>
</body>
</html>
