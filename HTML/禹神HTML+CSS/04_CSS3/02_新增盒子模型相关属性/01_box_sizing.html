<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>box-sizing</title>
    <style>
        .box1 {
            width: 200px;
            height: 200px;
            background-color: deeppink;
            background-image: linear-gradient(to right, red, orange, yellow, green, aqua, blue, purple);
            margin: 50px 50px;
            padding: 5px;
            border: 5px solid black;
            box-sizing: border-box;
            resize: both;
            overflow: hidden;
            position: relative;
            top: 0;
            left: 0;
            transition: 0.3s linear all;
            opacity: 0.5;
        }
        .box1:hover {
            box-shadow: 0 0 20px black;
            top: -1px;
            left: 0;
        }
    </style>
</head>
<body>
    <div class="box1">首页</div>
</body>
</html>
