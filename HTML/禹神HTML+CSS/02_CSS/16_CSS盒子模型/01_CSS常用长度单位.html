<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS常用长度单位</title>
    <style>
        #d1 {
            width: 200px;
            height: 200px;
            font-size: 20px;
            background-color: skyblue;
        }

        #d2 {
            /* em 相对于font-size的倍数 */
            /* rem 相对于html根元素的倍数 */
            /* % 相对于父元素的百分比 */
            width: 10em;
            height: 10em;
            font-size: 20px;
            background-color: pink;
        }
    </style>
</head>
<body>
    <div id="d1">1</div>
    <div id="d2">1</div>
</body>
</html>
