<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>布局技巧</title>
    <style>
        .outer {
            width: 400px;
            height: 400px;
            background-color: skyblue;
            overflow: hidden;
        }

        .inner {
            width: 200px;
            height: 100px;
            padding: 5px;
            border: 5px solid red;
            background-color: pink;
            margin: 140px auto 0;
            text-align: center;
            line-height: 100px;
        }
    </style>
</head>
<body>
    <div class="outer"><div class="inner">inner</div></div>
</body>
</html>
