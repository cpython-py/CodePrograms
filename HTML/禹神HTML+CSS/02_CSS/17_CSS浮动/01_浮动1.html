<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>浮动1</title>
    <style>
        .outer {
            width: 800px;
            height: 400px;
            background-color: gray;
            margin: 20px;
        }

        .box {
            font-size: 20px;
            padding: 10px;
        }

        .box1 {
            background-color: red;
        }

        .box2 {
            background-color: green;
            float: left;
            width: 100px;
            height: 80px;
        }

        .box3 {
            background-color: blue;
        }
    </style>
</head>
<body>
   <div class="outer">
       <div class="box box1">盒子1</div>
       <div class="box box2">盒子2</div>
       <div class="box box3">盒子3</div>
   </div>
</body>
</html>
