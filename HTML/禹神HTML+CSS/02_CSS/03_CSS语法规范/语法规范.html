<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>语法规范</title>
    <style>
        /* 颜色为红色 */
        h1 {
            color: red;
        }
        h2 {
            color: green;
        }
        p {
            color: blue;
        }
        img {
            width: 200px;
        }
    </style>
</head>
<body>
    <h1>欢迎来到尚硅谷学习!</h1>
    <h2>欢迎学习前端</h2>
    <p>欢迎不学习后端</p>
    <img src="../images/小姐姐.gif" alt="小姐姐">
</body>
</html>
