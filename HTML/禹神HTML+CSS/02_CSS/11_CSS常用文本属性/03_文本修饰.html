<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>文本修饰</title>
    <style>
        /* underline 下划线, overline 上划线, line-through 中划线 none 无*/
        /* dotted 虚线 wavy 波浪线 */
        .atguigu {
            text-decoration: underline dotted red;
        }
    </style>
</head>
<body>
    <h2 class="atguigu">尚硅谷</h2>
</body>
</html>
