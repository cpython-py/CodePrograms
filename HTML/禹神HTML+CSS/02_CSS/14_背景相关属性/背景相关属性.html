<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>背景相关属性</title>
    <style>
        body {
            background-color: gray;
        }
        div {
            width: 400px;
            height: 400px;
            background-color: skyblue;
            border: 2px solid red;
            font-size: 40px;
            background-image: url("悟空.jpg"); /* 背景图片 */
            background-repeat: no-repeat; /* 背景图片重复方式 */
            background-position:  center; /* 背景图片位置 */
        }
    </style>
</head>
<body>
    <div>你好啊!</div>
</body>
</html>
