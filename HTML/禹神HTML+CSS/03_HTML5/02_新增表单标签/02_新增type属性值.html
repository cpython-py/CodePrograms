<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>新增type属性值</title>
</head>
<body>
    <form action="#">
        账号: <input type="text" name="account">
        <br>
        密码: <input type="password" name="password">
        <br>
        性别: <input type="radio" name="sex" value="male">男
        <input type="radio" name="sex" value="female">女
        <br>
        邮箱: <input type="email" name="email">
        <br>
        url: <input type="url" name="url">
        <br>
        数值: <input type="number" name="number" step="4">
        <br>
        搜索: <input type="search" name="search">
        <br>
        电话: <input type="tel" name="tel">
        <br>
        范围: <input type="range" name="range">
        <br>
        颜色: <input type="color" name="color">
        <br>
        日期: <input type="date" name="date">
        <br>
        时间: <input type="time" name="time">
        <br>
        日期时间: <input type="datetime-local" name="datetime-local">
        <br>
        月份: <input type="month" name="month">
        <br>
        周: <input type="week" name="week">
        <br>
        时间: <input type="time" name="time">
        <br>
        日期时间: <input type="datetime-local" name="datetime-local">
        <br>
        爱好: <input type="checkbox" name="hobby" value="sing">唱歌
        <input type="checkbox" name="hobby" value="dance">跳舞
        <input type="checkbox" name="hobby" value="swim">游泳
        <br>
        城市: <select name="city">
            <option value="beijing">北京</option>
            <option value="shanghai">上海</option>
            <option value="guangzhou">广州</option>
        <option value="shenzhen">深圳</option>
        </select>
        <br>
        <input type="submit" value="提交">
    </form>
</body>
</html>
