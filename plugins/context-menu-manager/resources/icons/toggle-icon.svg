<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <defs>
    <linearGradient id="toggleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#AB47BC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8E24AA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="12" cy="12" r="11" fill="url(#toggleGradient)"/>
  
  <!-- 切换开关图标 -->
  <g fill="none" stroke="white" stroke-width="1.8">
    <!-- 开关轨道 -->
    <rect x="5" y="9" width="14" height="6" rx="3" fill="white" fill-opacity="0.3"/>
    <!-- 开关圆点 -->
    <circle cx="15" cy="12" r="2.5" fill="white"/>
  </g>
  
  <!-- 闪烁效果 -->
  <circle cx="15" cy="12" r="4" fill="white" fill-opacity="0.2">
    <animate attributeName="r" from="2.5" to="4" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" from="0.3" to="0" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
