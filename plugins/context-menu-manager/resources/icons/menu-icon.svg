<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2196F3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="12" cy="12" r="11" fill="url(#iconGradient)" filter="url(#shadow)"/>
  
  <!-- 菜单图标线条 -->
  <g fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
    <!-- 第一条线 -->
    <line x1="6" y1="8" x2="18" y2="8" opacity="0.9"/>
    <!-- 第二条线 -->
    <line x1="6" y1="12" x2="18" y2="12" opacity="0.9"/>
    <!-- 第三条线 -->
    <line x1="6" y1="16" x2="18" y2="16" opacity="0.9"/>
  </g>
  
  <!-- 右上角小圆点装饰 -->
  <circle cx="18" cy="6" r="2.5" fill="#FFD54F"/>
  <circle cx="18" cy="6" r="1.5" fill="#FFA726"/>
</svg>
