<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <button class="btn">注册账号</button>
<script src="../axios.min.js"></script>
<script>
    document.querySelector('.btn').addEventListener('click', e => {
        axios({
            url: 'http://hmajax.itheima.net/api/register',
            method: 'POST',
            data: {
                username: 'ee3123456',
                password: '123456'
            }
        }).then(result => {
            alert(result.data.message)
        }).catch(error => {
            alert(error.response.data.message)
        })
    })
</script>
</body>
</html>
