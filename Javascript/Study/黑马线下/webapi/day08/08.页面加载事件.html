<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script>
        window.addEventListener('load', function () {
            const p = document.querySelector('p')
            p.innerHTML = '你好狗哥'
        })
        window.addEventListener('DOMContentLoaded', function () {
            const div = document.querySelector('div')
            div.innerHTML = 'Hello, 狗哥'
        })
    </script>
</head>
<body>
    <div>文本</div>
    <p>哈哈</p>
</body>
</html>
