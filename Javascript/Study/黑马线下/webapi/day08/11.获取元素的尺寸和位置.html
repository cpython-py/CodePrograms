<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        .father {
            border: 1px solid black;
            padding: 10px;
            overflow: hidden;
            margin: 50px auto;
            width: 500px;
            height: 500px;
            background-color: #8df;
        }
        .son {
            margin: 50px auto;
            width: 300px;
            height: 300px;
            background-color: #ff8500;
        }
    </style>
</head>
<body>
    <div class="father">
        <div class="son"></div>
    </div>
<script>
    const father = document.querySelector('.father')
    console.log(father.offsetWidth)
    console.log(father.offsetHeight)
    console.log(father.offsetLeft)
    console.log(father.offsetTop)
</script>
</body>
</html>
