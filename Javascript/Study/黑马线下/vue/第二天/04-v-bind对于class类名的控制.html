<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Document</title>
    <style>
        .box {
            width: 200px;
            height: 200px;
            border: 3px solid #000;
            font-size: 30px;
            margin-top: 10px;
        }

        .pink {
            background-color: pink;
        }

        .big {
            width: 300px;
            height: 300px;
        }
    </style>
</head>

<body>

<div id="app">
    <div :class="{box:2>1, pink:flag, big:true}">黑马程序员</div>
    <div :class="['box', flag?'pink':'', 'big']">黑马程序员</div>
</div>
<script src="../js/vue-2.7.14.js"></script>
<script>
    const app = new Vue({
        el: '#app',
        data: {
            flag: true
        }
    })
</script>
</body>

</html>
