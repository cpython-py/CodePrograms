<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let va = true;
    let vb = false;
    document.write(va && vb);
    document.write('<br>');
    document.write(va || vb);
    document.write('<br>');
    document.write(!va);
    document.write('<br>');
    document.write(!vb);
</script>
</body>
</html>
