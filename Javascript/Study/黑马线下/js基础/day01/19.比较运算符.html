<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let num = 10;
    let num2 = '10';
    document.write(num === num2);
    document.write(num == num2);
    document.write(num != num2);
    document.write(num !== num2);
    document.write(num > num2);
    document.write(num < num2);
    document.write(num >= num2);
    document.write(num <= num2);
</script>
</body>
</html>
