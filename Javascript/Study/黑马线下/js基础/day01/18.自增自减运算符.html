<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let num = 10;
    num++;
    document.write(num);
    document.write('<br>');
    num--;
    document.write(num);
    document.write('<br>');
    ++num;
    document.write(num);
    document.write('<br>');
    --num;
    document.write(num);
</script>
</body>
</html>
