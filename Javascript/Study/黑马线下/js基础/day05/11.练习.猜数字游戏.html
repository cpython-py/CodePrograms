<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    let randInt = Math.round(Math.random() * 10);
    let getGuessNumber = +prompt('请输入你猜的数字: ');
    while (true) {
        if (getGuessNumber < randInt){
            alert('小了!')
            getGuessNumber = +prompt('请输入你猜的数字: ');
        } else if (getGuessNumber > randInt) {
            alert('大了')
            getGuessNumber = +prompt('请输入你猜的数字: ');
        } else {
            alert('恭喜你猜对了')
            break
        }
    }

</script>
</body>
</html>
