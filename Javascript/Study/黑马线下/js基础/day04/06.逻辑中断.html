<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    let zero = 0;
    let num = 10;
    let num2 = 20;
    // 左侧为真返回右侧, 左侧为假返回左侧 && 和 || 效果一样
    console.log(num && num2);
    console.log(num2 && num);
    console.log(zero && num);
    console.log(num || num2);
    console.log(num2 || num);
    console.log(zero || num);
</script>
</body>
</html>
