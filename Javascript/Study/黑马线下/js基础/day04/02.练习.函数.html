<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    function DOMTwoNumberAdd(number1, number2) {
        document.write(number1+number2, '<br>')
    }

    function DOMTotalFromOneToHundred() {
        let total = 0;
        for (let i = 0; i <= 100; i++) {
            total += i
        }
        document.write(total.toString() + '<br>')
    }

    DOMTwoNumberAdd(1, 4);
    DOMTotalFromOneToHundred();
</script>
</body>
</html>
