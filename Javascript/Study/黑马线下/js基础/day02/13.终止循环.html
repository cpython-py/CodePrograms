<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let i = 0;
    while (i < 8) {
        i++;
        if (i == 7) {
            continue;
        }
        document.write(String(i + '<br>'));
    }

    for (let i = 0; i <= 10000; i++) {
        if (i == 18) {
            break;
        }
        document.write(String(i + '<br>'));
    }
</script>
</body>
</html>
