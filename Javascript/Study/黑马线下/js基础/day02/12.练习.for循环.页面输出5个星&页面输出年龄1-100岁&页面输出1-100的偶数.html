<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    for (let i = 0;i <= 5;i++) {
        document.write('※');
    }

    for (let i = 0;i <= 100;i++) {
        document.write('小明今年' + i + '岁了' + '<br>');
    }

    for (let i = 0; i <= 100;i+=2) {
        document.write(i + '<br>');
    }
</script>
</body>
</html>
