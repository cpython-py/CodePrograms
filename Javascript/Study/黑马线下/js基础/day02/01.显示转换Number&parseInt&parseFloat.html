<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let number = '10.33';
    let numberUseNumber = Number(number);
    console.log(typeof numberUseNumber);
    let number2 = '10.6px';
    let number2UseParseInt = parseInt(number2);
    console.log(number2UseParseInt);
    let number2UseParseFloat = parseFloat(number2);
    console.log(number2UseParseFloat);
    console.log(Number(true));
    console.log(Number(false));
    console.log(Number(null));
    console.log(Number(undefined));

</script>
</body>
</html>
