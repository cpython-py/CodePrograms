<script>
    let myArray = [10, 9, 18, 7, 36];
    myArray.sort(function (a, b) {return a-b});
    console.log(myArray);
    let myArray2 = [10, 9, 18, 7, 36];
    myArray2.sort(function (a, b) {return b-a});
    console.log(myArray2);
</script>
