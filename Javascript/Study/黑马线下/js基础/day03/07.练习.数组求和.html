<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    let numberArray = [2, 6, 1, 7, 4];
    let total = 0;
    for (let i = 0; i < numberArray.length; i++) {
        total += numberArray[i]
    }
    document.write(total);
    document.write('<br>');
    document.write(String(total / numberArray.length));
</script>
</body>
</html>
