<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <div id="app">
        <h1 v-html="atag"></h1>
        <h1 v-text="num+1"></h1>
    </div>

    <script src="vue.js"></script>

    <script>
        let vm = new Vue({
            el: '#app', //通过vue语法来控制id="app"的标签
            data() {
                return {
                    atag: '<a href="http://www.baidu.com">百度</a>',
                    num: 100,
                }
            }
        })
    </script>
</body>

</html>
