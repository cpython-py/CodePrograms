<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .c1 {
            color: red;
        }

        .c2 {
            color: green;
        }
    </style>
</head>

<body>
    <div id="xx">
        <p :class="{c1:num<10,c2:num>=10}">床前明月光</p>
    </div>
</body>

<script src="./vue.js"></script>
<script>
    new Vue({
        el: '#xx',
        data() {
            return {
                num: 9,
            }
        },

    })
</script>

</html>
