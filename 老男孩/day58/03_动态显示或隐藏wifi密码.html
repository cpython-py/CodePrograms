<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app">
        <input :type="tt"><button @click="showp">{{ msg }}</button>
        <h2 style="float:left;">{{ num }}<button @click="num++" style="float:right;font-size:large;">+1</button></h2>
        <input type="text" v-model="num">
        <h1>{{ num }}</h1>


    </div>
</body>
<script src="./vue.js"></script>
<script>
    let vm = new Vue({
        el: '#app',
        data() {
            return {
                tt: 'password',
                msg: '显示密码',
                num: 1,
            }
        },

        methods: {
            showp() {
                if (this.tt === 'password') {
                    this.tt = 'text';
                    this.msg = '隐藏密码';
                } else {
                    this.tt = 'password';
                    this.msg = '显示密码';
                }


            }

        }
    })
</script>

</html>
