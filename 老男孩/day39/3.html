<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>input属性</title>
</head>
<body>
    <form>
        用户名:<input type="text" name="username" placeholder="请输入用户名" required>
        <br>
        密码:<input type="password" name="pwd" tabindex=2>
        <br>
        年龄:<input type="text" name="age" value="18" readonly>
        <br>
        邮箱:<input type="email" name="email" value="123456@abc.com" disabled>
        <br>
        班级:<input type="text" name="classroom" size="20" maxlength="5" minlength="2">
        <br>
        国籍:<input type="text" name="country" autofocus tabindex=1>
        <hr>
        <input type="submit">
    </form>
</body>
</html>
