<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单选框,复选框,下拉框</title>
</head>
<body>
    <form action="" method="">
        <!-- 单选框 radio -->
        <input type="radio" name="sex" value="m" id="sex1"><label for="sex1">男性</label>
        <input type="radio" name="sex" value="w" id="sex2"><label for="sex2">女性</label>

        <hr>

        <!-- 复选框 checkbox -->
        <input type="checkbox" name="food" value="banana">香蕉
        <input type="checkbox" name="food" value="qie">茄子
        <input type="checkbox" name="food" value="huanggua">黄瓜
        <input type="checkbox" name="food" value="donggua">冬瓜

        <hr>

        <!-- 下拉框 select -->
        <select name="city">
            <option value="beijing">北京人</option>
            <option value="shanghai">上海人</option>
            <option value="guangzhou">广州人</option>
            <option value="shenzhen">深圳人</option>
            <option value="hangzhou" selected>杭州人</option>
            <option value="waixing" disabled>外星人</option>
        </select>

        <hr>

        <input type="submit" value="提交"></input>
    </form>
</body>
</html>
