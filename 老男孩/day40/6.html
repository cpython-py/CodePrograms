<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>switch case</title>
</head>
<body>
    <script>
        var date = new Date();
        console.log(date);
        var week = date.getDay();
        console.log(week);

        if (week == 4) {
            console.log("今天是星期四");
        }
    </script>
</body>
</html>
